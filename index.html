<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Haplab Blog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      color: #fff;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #888;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: #e8a020;
      border-radius: 50%;
      margin-right: 12px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="dot"></span>Haplab Blog</h1>
    <p>Coming soon.</p>
  </div>
</body>
</html>
